name: Test Latest JDK Commits

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test-latest-jdk:
    runs-on: ubuntu-latest
    environment: LLM
    timeout-minutes: 180
    concurrency:
      group: test-latest-jdk-${{ github.ref }}
      cancel-in-progress: false
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_BASE_URL: ${{ vars.OPENAI_BASE_URL || 'https://integrate.api.nvidia.com/v1' }}
      OPENAI_MODEL: ${{ vars.REASONER_MODEL || 'deepseek-reasoner' }}
      ARK_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      ARK_BASE_URL: ${{ vars.ARK_BASE_URL || 'https://integrate.api.nvidia.com/v1' }}
      ARK_MODEL: ${{ vars.FLASH_MODEL || 'doubao-seed-1-6-flash-250715' }}
      MOONSHOT_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      MOONSHOT_BASE_URL: ${{ vars.MOONSHOT_BASE_URL || 'https://integrate.api.nvidia.com/v1' }}
      MOONSHOT_MODEL: ${{ vars.AGENT_MODEL || 'kimi-k2-0905-preview' }}
      BOCHA_API_KEY: ${{ secrets.BOCHA_API_KEY }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "23"
          cache: maven

      - name: Install jtreg from Adoptium CI
        run: |
          set -euo pipefail
          curl -sL "https://ci.adoptium.net/view/Dependencies/job/dependency_pipeline/lastSuccessfulBuild/artifact/jtreg/jtreg-7.5.2+1.tar.gz" -o jtreg.tar.gz
          tar xzf jtreg.tar.gz
          echo "$PWD/jtreg/bin" >> "$GITHUB_PATH"
          "$PWD/jtreg/bin/jtreg" -version

      - name: Clone jdk17u-dev
        run: |
          set -euo pipefail
          git clone https://github.com/openjdk/jdk17u-dev

      - name: Configure JavaOracle runtime paths
        run: |
          set -euo pipefail
          sed -i "s#^suiteBasePath=.*#suiteBasePath=$GITHUB_WORKSPACE/jdk17u-dev/test/jdk/#" config.properties
          sed -i "s#^jdkTestPath=.*#jdkTestPath=$GITHUB_WORKSPACE/jdk17u-dev/test#" config.properties
          sed -i "s#^jdkPaths=.*#jdkPaths=$JAVA_HOME#" config.properties
          sed -i "s#^useCacheMode=.*#useCacheMode=false#" config.properties
          sed -i "s#^testCoreMultiplier=.*#testCoreMultiplier=2.0#" config.properties
          sed -i "s#^testMaxMultiplier=.*#testMaxMultiplier=3.0#" config.properties
          sed -i "s#^testQueueSize=.*#testQueueSize=500#" config.properties
          sed -i "s#^threadMultiplierExecute=.*#threadMultiplierExecute=3#" config.properties

      - name: Validate required LLM secrets
        run: |
          set -euo pipefail
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "Missing OPENAI_API_KEY secret." >&2
            exit 1
          fi

      - name: Build JavaOracle
        run: mvn -B -Dmaven.test.skip=true package

      - name: Detect changed test files
        id: detect
        run: |
          set -euo pipefail
          CHANGED_CASES=$(git -C jdk17u-dev log --since="24 hours ago" --name-only --pretty=format: -- test/jdk/java test/jdk/javax | grep '\.java$' | sort -u || true)
          if [ -z "$CHANGED_CASES" ]; then
            echo "No java/javax testcases changed in the last 24 hours."
            echo "found=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "=== Changed test files ==="
          echo "$CHANGED_CASES"
          echo "$CHANGED_CASES" | sed -E 's#^test/jdk/##; s#/[^/]+$##' | sort -u > changed_targets.txt
          echo "=== Target directories ==="
          cat changed_targets.txt
          echo "found=true" >> "$GITHUB_OUTPUT"

      - name: Run JavaOracle on changed tests
        if: steps.detect.outputs.found == 'true'
        run: |
          set -euo pipefail
          while IFS= read -r target; do
            [ -z "$target" ] && continue
            echo "::group::Running JavaOracle execute for: $target"
            mvn -B -q exec:java -Dexec.mainClass=edu.tju.ista.llm4test.Main -Dexec.args="execute $target" || echo "Warning: JavaOracle returned non-zero for $target"
            echo "::endgroup::"
          done < changed_targets.txt

      - name: Commit and push updated pass list
        if: steps.detect.outputs.found == 'true'
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ValidTestCases/
          if git diff --cached --quiet; then
            echo "No pass list changes to commit"
          else
            CHANGED=$(wc -l < changed_targets.txt | tr -d ' ')
            git commit -m "update pass list: incremental update ($CHANGED targets) [skip ci]"
            git push
          fi
