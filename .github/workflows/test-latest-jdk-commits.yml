name: Test Latest JDK Commits

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-latest-jdk:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    concurrency:
      group: test-latest-jdk-${{ github.ref }}
      cancel-in-progress: false
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_BASE_URL: ${{ vars.OPENAI_BASE_URL || 'https://api.deepseek.com/beta/v1' }}
      OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'deepseek-chat' }}
      ARK_API_KEY: ${{ secrets.ARK_API_KEY }}
      ARK_BASE_URL: ${{ vars.ARK_BASE_URL || 'https://ark.cn-beijing.volces.com/api/v3' }}
      ARK_MODEL: ${{ vars.ARK_MODEL || 'ep-20250615170506-mtn4k' }}
      MOONSHOT_API_KEY: ${{ secrets.MOONSHOT_API_KEY }}
      MOONSHOT_BASE_URL: ${{ vars.MOONSHOT_BASE_URL || 'https://api.moonshot.cn/v1' }}
      BOCHA_API_KEY: ${{ secrets.BOCHA_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "23"
          cache: maven
      - name: Check LLM secrets
        id: check-secrets
        run: |
          set -euo pipefail
          if [ -z "$OPENAI_API_KEY" ] && [ -z "$ARK_API_KEY" ] && [ -z "$MOONSHOT_API_KEY" ]; then
            echo "::warning::Missing LLM API key secrets. Set at least one of OPENAI_API_KEY / ARK_API_KEY / MOONSHOT_API_KEY. Skipping test run."
            echo "has_keys=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_keys=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Install jtreg
        if: steps.check-secrets.outputs.has_keys == 'true'
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y jtreg
      - name: Clone jdk17u-dev
        if: steps.check-secrets.outputs.has_keys == 'true'
        run: |
          set -euo pipefail
          # keep full history: changed-test discovery relies on git log --since over the last 24h
          git clone https://github.com/openjdk/jdk17u-dev
      - name: Configure JavaOracle runtime paths
        if: steps.check-secrets.outputs.has_keys == 'true'
        run: |
          set -euo pipefail
          sed -i "s#^suiteBasePath=.*#suiteBasePath=$GITHUB_WORKSPACE/jdk17u-dev/test/jdk/#" config.properties
          sed -i "s#^jdkTestPath=.*#jdkTestPath=$GITHUB_WORKSPACE/jdk17u-dev/test#" config.properties
          sed -i "s#^jdkPaths=.*#jdkPaths=$JAVA_HOME#" config.properties
      - name: Build JavaOracle
        if: steps.check-secrets.outputs.has_keys == 'true'
        run: mvn -B -Dmaven.test.skip=true package
      - name: Run JavaOracle on changed tests in last 24 hours
        if: steps.check-secrets.outputs.has_keys == 'true'
        run: |
          set -euo pipefail
          CHANGED_CASES=$(git -C jdk17u-dev log --since="24 hours ago" --name-only --pretty=format: -- test/jdk/java test/jdk/javax | grep '\.java$' | sort -u || true)
          if [ -z "$CHANGED_CASES" ]; then
            echo "No java/javax testcases changed in the last 24 hours."
            exit 0
          fi
          echo "$CHANGED_CASES" | sed -E 's#^test/jdk/##; s#/[^/]+$##' | sort -u > changed_targets.txt
          while IFS= read -r target; do
            [ -z "$target" ] && continue
            echo "Running JavaOracle execute for: $target"
            mvn -B -q exec:java -Dexec.mainClass=edu.tju.ista.llm4test.Main -Dexec.args="execute $target"
          done < changed_targets.txt
