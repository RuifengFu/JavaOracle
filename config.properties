# 基础路径配置
baseDocPath=JavaDoc/docs/api/java.base
suiteBasePath=jdk17u-dev/test/jdk/
testDir=test
jdkTestPath=jdk17u-dev/test
jdkSourcePath=jdk17u-dev/src
defaultSourcePrefix=java.base/share/classes
bugReportDir=BugReport
logFile=result.log

# 依赖jar包配置
# 测试执行时需要的依赖库路径，多个jar包用逗号分隔
# 包含TestNG、JUnit等测试框架
jars=Dependency/testng-7.10.2.jar,Dependency/junit-jupiter-api-5.11.4.jar,Dependency/junit-jupiter-engine-5.11.4.jar,Dependency/junit-4.13.1.jar

# 文件处理配置
# 最大文件大小限制（字节）：
# 防止处理过大的文件导致内存溢出或处理时间过长
maxFileSize=10000

# 线程池配置
# 生成模式线程倍数：用于LLM调用生成测试用例时的线程池大小计算
# 计算公式：线程数 = CPU核心数 × threadMultiplierGenerate
# 建议值：3-5（IO密集型任务，可以设置较高倍数）
threadMultiplierGenerate=3

# 执行模式线程倍数：用于编译和运行测试用例时的线程池大小计算  
# 计算公式：线程数 = CPU核心数 × threadMultiplierExecute
# 建议值：1-2（CPU密集型任务，避免过度竞争）
threadMultiplierExecute=2


# 测试执行器线程池配置
# 核心线程倍数：CPU核心数 × 此值（建议0.5-1.0）
testCoreMultiplier=1.0
# 最大线程倍数：CPU核心数 × 此值（建议1.0-2.0）
testMaxMultiplier=1.5
# 任务队列大小：有界队列，控制任务缓冲（建议100-1000）
testQueueSize=200


# 执行器关闭超时时间（秒）：线程池优雅关闭时的等待时间
# 超过此时间将强制关闭线程池
executorShutdownTimeoutSeconds=30

# 虚拟线程支持配置（Java 19+）
# 是否启用虚拟线程支持，false会强制使用传统线程池
# 虚拟线程适合IO密集型任务（如LLM调用），可显著提升并发性能
virtualThreads.enabled=true

# LLM调用控制配置
# 最大QPS（每秒请求数）：防止过快调用LLM API导致限流
# 设置为0表示不限制QPS
llm.maxQps=10

# 最大并发任务数：同时执行的LLM任务最大数量
# 配合虚拟线程使用，可以设置较大值（如50-200）
# 传统线程池建议设置较小值（如10-20）
llm.maxConcurrency=50

# Flash模式配置
# 是否使用Flash模式：启用后将使用非常便宜的模型来处理所有问题
# 适合大规模测试或成本敏感场景，可能会影响生成质量
# 默认值：false
useFlash=false

# 模板配置
# 测试生成模板模式：决定使用哪种测试生成策略
# 可选值：SpecTest（基于规范的测试）、UnitTest（单元测试）等
templateMode=SpecTest

# 系统配置
# 是否使用系统代理设置：自动读取系统的代理配置
useSystemProxies=true

# 代理配置
# 是否启用自定义代理：用于网络请求（如LLM API调用）
proxy.enabled=true
# 代理主机地址
proxy.host=172.19.135.130
# 代理端口
proxy.port=5000

# 缓存配置
# 有效测试用例缓存目录：存储已验证的测试用例列表
# 用于加速重复执行时的测试用例过滤
validTestCasesDir=ValidTestCases

# 是否使用缓存模式：启用后会跳过已知无效的测试用例
# 可显著提升大规模测试时的执行效率
useCacheMode=true

# JDK 执行路径配置
jdkPaths=/home/Java/HotSpot/jdk-17.0.14+7

# API Configuration
# Environment variables are prioritized for API keys and URLs.
# If an environment variable is not set, the value from this file is used.

# OpenAI (Deepseek) API Configuration
# Env Var: OPENAI_API_KEY(not recommended), OPENAI_BASE_URL, OPENAI_MODEL
# openai.api.key=sk-xxxxxx
openai.base.url=https://api.deepseek.com/beta/v1/chat/completions
openai.model=deepseek-chat
openai.r1.model=deepseek-reasoner
openai.v3.model=deepseek-chat

# ByteDance Doubao (Ark) API Configuration
# Env Var: ARK_API_KEY(not recommended), ARK_BASE_URL, ARK_MODEL
# doubao.api.key=sk-xxxx
doubao.base.url=https://ark.cn-beijing.volces.com/api/v3/chat/completions
doubao.model=ep-20250615170506-mtn4k

# WebSearch (Bocha) API Configuration
# Env Var: BOCHA_API_KEY
# bocha.api.key=sk-xxxxxx
websearch.api.base.url=https://api.bochaai.com/v1/web-search
websearch.rerank.api.url=https://api.bochaai.com/v1/rerank
