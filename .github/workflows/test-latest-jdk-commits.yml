name: Test Latest JDK Commits

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-latest-jdk:
    runs-on: ubuntu-latest
    environment: LLM
    timeout-minutes: 180
    concurrency:
      group: test-latest-jdk-${{ github.ref }}
      cancel-in-progress: false
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_BASE_URL: ${{ vars.OPENAI_BASE_URL || 'https://integrate.api.nvidia.com/v1' }}
      OPENAI_MODEL: ${{ vars.REASONER_MODEL || 'deepseek-reasoner' }}
      ARK_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      ARK_BASE_URL: ${{ vars.ARK_BASE_URL || 'https://integrate.api.nvidia.com/v1' }}
      ARK_MODEL: ${{ vars.FLASH_MODEL || 'doubao-seed-1-6-flash-250715' }}
      MOONSHOT_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      MOONSHOT_BASE_URL: ${{ vars.MOONSHOT_BASE_URL || 'https://integrate.api.nvidia.com/v1' }}
      MOONSHOT_MODEL: ${{ vars.AGENT_MODEL || 'kimi-k2-0905-preview' }}
      BOCHA_API_KEY: ${{ secrets.BOCHA_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "23"
          cache: maven
      - name: Install jtreg
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y jtreg
      - name: Clone jdk
        run: |
          set -euo pipefail
          # keep full history: changed-test discovery relies on git log --since over the last 24h
          git clone https://github.com/openjdk/jdk
      - name: Configure JavaOracle runtime paths
        run: |
          set -euo pipefail
          sed -i "s#^suiteBasePath=.*#suiteBasePath=$GITHUB_WORKSPACE/jdk/test/jdk/#" config.properties
          sed -i "s#^jdkTestPath=.*#jdkTestPath=$GITHUB_WORKSPACE/jdk/test#" config.properties
          sed -i "s#^jdkPaths=.*#jdkPaths=$JAVA_HOME#" config.properties
      - name: Validate required LLM secrets
        run: |
          set -euo pipefail
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "Missing OPENAI_API_KEY secret." >&2
            exit 1
          fi
      - name: Build JavaOracle
        run: mvn -B -Dmaven.test.skip=true package
      - name: Detect changed test files
        id: detect
        run: |
          set -euo pipefail
          CHANGED_CASES=$(git -C jdk log --since="24 hours ago" --name-only --pretty=format: -- test/jdk/java test/jdk/javax | grep '\.java$' | sort -u || true)
          if [ -z "$CHANGED_CASES" ]; then
            echo "No java/javax testcases changed in the last 24 hours."
            echo "found=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "=== Changed test files ==="
          echo "$CHANGED_CASES"
          echo "$CHANGED_CASES" | sed -E 's#^test/jdk/##; s#/[^/]+$##' | sort -u > changed_targets.txt
          echo "=== Target directories ==="
          cat changed_targets.txt
          echo "found=true" >> "$GITHUB_OUTPUT"
      - name: Run JavaOracle on changed tests
        if: steps.detect.outputs.found == 'true'
        run: |
          set -euo pipefail
          while IFS= read -r target; do
            [ -z "$target" ] && continue
            echo "::group::Running JavaOracle execute for: $target"
            mvn -B -q exec:java -Dexec.mainClass=edu.tju.ista.llm4test.Main -Dexec.args="execute $target" || echo "Warning: JavaOracle returned non-zero for $target"
            echo "::endgroup::"
          done < changed_targets.txt
